services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - env.example
    ports:
      - "5000:5000"
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
    restart: unless-stopped

  marimo-review:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - env.example
    command: >
      sh -c 'test -n "$${ADMIN_REVIEW_TOKEN}" ||
      (echo "ADMIN_REVIEW_TOKEN is required" >&2; exit 1);
      marimo run apps/review/admin_formula_review.py
      --host 0.0.0.0
      --port "$${MARIMO_PORT:-2718}"
      --base-url "$${MARIMO_BASE_URL:-/admin/review}"
      --headless
      --token
      --token-password "$${ADMIN_REVIEW_TOKEN}"'
    ports:
      - "2718:2718"
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
    restart: unless-stopped
